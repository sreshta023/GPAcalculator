<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPA & CGPA Calculator</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>GPA & CGPA Calculator</h1>

<h2>Add Subject</h2>

<input type="text" id="subject" placeholder="Subject Name">

<input type="number" id="credits" placeholder="Credits">

<select id="grade">
<option value="10">O (10)</option>
<option value="9">A+ (9)</option>
<option value="8">A (8)</option>
<option value="7">B+ (7)</option>
<option value="6">B (6)</option>
<option value="5">C (5)</option>
<option value="0">F (0)</option>
</select>

<button onclick="addSubject()">Add Subject</button>

<table>

<thead>
<tr>
<th>Subject</th>
<th>Credits</th>
<th>Grade</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<button onclick="calculateGPA()">Calculate GPA</button>

<h2>Semester GPA: <span id="gpa">0.00</span></h2>

<hr>

<h2>Running CGPA</h2>

<input type="number" id="previousCredits" placeholder="Previous Total Credits">

<input type="number" step="0.01" id="previousCGPA" placeholder="Previous CGPA">

<button onclick="calculateCGPA()">Calculate CGPA</button>

<h2>Current CGPA:
<span id="cgpa">0.00</span>
</h2>

<hr>

<h2>What If Calculator</h2>

<input type="number" id="futureCredits" placeholder="Future Semester Credits">

<select id="futureGrade">
<option value="10">10</option>
<option value="9">9</option>
<option value="8">8</option>
<option value="7">7</option>
<option value="6">6</option>
<option value="5">5</option>
</select>

<button onclick="predictCGPA()">Predict CGPA</button>

<h2>Predicted CGPA:
<span id="prediction">0.00</span>
</h2>

</div>

<script src="script.js"></script>

</body>
</html>
